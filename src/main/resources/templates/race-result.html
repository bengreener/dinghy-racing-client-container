 <!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
	<head>
		<meta charset="UTF-8">
		<link rel="stylesheet" href="../normalize.css"/>
		<link rel="stylesheet" href="../main.css"/>
		<link rel="stylesheet" href="../w3.css"/>
		<link rel="stylesheet" href="../w3-bginfosys-extensions.css"/>
    	<link rel="stylesheet" href="../external/local.css" />
		<title>Race Results</title>
	</head>
	<body>
		<img class="club-pennant" />
		<h1 class="w3-center club-pennant-before" >Chipstead Sailing Club</h1>
		<h2 class="w3-center" th:text="${race.name}" ></h2>
		<button class="no-print" onclick="window.print()">Print Results</button>
		<div>
		<table class="result-table bgis-table bgis-border-2 w3-border-black w3-auto">
			<tr>
				<th class="bgis-border-2 w3-border-black bgis-table-cell">Helm Name</th>
				<th class="bgis-border-2 w3-border-black bgis-table-cell">Sail No</th>
				<th class="bgis-border-2 w3-border-black bgis-table-cell">Class</th>
				<th class="bgis-border-2 w3-border-black bgis-table-cell">Place</th>
				<th class="bgis-border-2 w3-border-black bgis-table-cell">Elapsed</th>
				<th class="bgis-border-2 w3-border-black bgis-table-cell">Laps</th>
				<th class="bgis-border-2 w3-border-black bgis-table-cell">Code</th>
				<th class="bgis-border-2 w3-border-black bgis-table-cell">Race Rating</th>
				<th class="bgis-border-2 w3-border-black bgis-table-cell">Corrected</th>
			</tr>
			<tr class="bgis-border-2" th:each="signedUp: ${race.signedUp}" >
				<td class="bgis-border-2 w3-border-black bgis-table-cell" th:text="${signedUp.entry.helm.name}" />
				<td class="bgis-border-2 w3-border-black bgis-table-cell" th:text="${signedUp.entry.dinghy.sailNumber}" />
				<td class="bgis-border-2 w3-border-black bgis-table-cell" th:text="${signedUp.entry.dinghy.dinghyClass.name}" />
				<td class="bgis-border-2 w3-border-black bgis-table-cell" th:text="${signedUp.position}" />
				<td class="bgis-border-2 w3-border-black bgis-table-cell" th:text="${signedUp.entry.time.getSeconds()}" />
				<td class="bgis-border-2 w3-border-black bgis-table-cell" th:text="${signedUp.entry.lapsSailed}" />
				<td class="bgis-border-2 w3-border-black bgis-table-cell" th:text="${signedUp.entry.ScoringAbbreviation}" />
				<td class="bgis-border-2 w3-border-black bgis-table-cell" th:text="${signedUp.entry.dinghy.dinghyClass.portsmouthNumber}" />
				<td class="bgis-border-2 w3-border-black bgis-table-cell" th:text="${signedUp.correctedTime.getSeconds()}" />
			</tr>
		</table>
		</div>
	</body>
</html>
